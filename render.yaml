# Render Blueprint — one-click deploy for the ParkPulse backend (FastAPI).
# In Render: New → Blueprint → pick this repo. It reads this file and provisions the service below.
# (The frontend deploys separately on Vercel — see fullstack/DEPLOY.md.)
services:
  - type: web
    name: parkpulse-api
    runtime: python
    rootDir: fullstack/backend
    plan: free                       # bump to "starter" to avoid cold-start sleep during judging
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION          # numpy 1.26.4 will not build on 3.13 — pin 3.12
        value: 3.12.7
      - key: GEMINI_API_KEY          # set this in the Render dashboard (kept secret, not in git)
        sync: false
      - key: COPILOT_MODEL
        value: gemini-2.5-flash
